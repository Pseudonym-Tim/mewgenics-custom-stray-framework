; ==================================
; Custom Stray Framework Spawn Debug
; ==================================
; Enabled: Enables/disables debug stray spawning...
; UseNativeStraySpawn: If 1, spawn hotkey also runs the game's normal House stray spawning. If 0, only framework cats spawn...
; Mode: Sets how debug spawn picks cats! "WeightedRandom" uses loaded custom cats and their weight values, "ExplicitList" uses [ExplicitList] definitions, and "All" tries every loaded custom cat up to the set count...
; Count: Number of debug-spawn attempts for Count-based modes like "WeightedRandom" or "All"...
; [ExplicitList]: Exact custom stray IDs to spawn when Mode is "ExplicitList", using Cat0, Cat1, Cat2, etc. (Must use custom stray IDs from loaded custom_strays.ini files)!

[Debug]
Enabled=1
UseNativeStraySpawn=0
Mode=ExplicitList
Count=1

[ExplicitList]
Cat0=Example_Felix