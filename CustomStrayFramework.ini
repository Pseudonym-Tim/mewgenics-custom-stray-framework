; ======================
; Custom Stray Framework
; ======================
; HotkeyVk: Manual debug-spawn hotkey, (default 118 = F7), reloads custom stray definitions and pulls info from debug_spawns.ini...
; ReloadHotkeyVk: Config reload hotkey, (default 120 = F9), force reloads this config, debug_spawns.ini, and custom_strays.ini files...
; EnableNativeStrayHook: Turns automatic native House stray behavior on or off, (1 uses NativeStrayMode, while 0 leaves only manual/debug behavior)...
; NativeStrayMode: "AppendExtra" keeps the game stray and adds extras, "ReplaceEach" lets every game-created stray candidate become a custom/special stray candidate, including mercy multi-spawns...
; SceneName: Game scene used for House stray placement, DON'T CHANGE THIS!
; HouseComponentType: Component used as the House stray placement point, DON'T CHANGE THIS!
; DefinitionFileName: Stray cat definition file name to search for in the root folder and sibling mod folders, this should never be changed from custom_strays.ini ideally...
; DebugFileName: File read by the debug-spawn hotkey, this should never be changed from debug_spawns.ini ideally...
; RollsPerNativeStrayEvent: Number of extra-cat roll attempts per native House stray event...
; ChancePercent: Success chance for each roll, (100 means every roll succeeds, while 25 means one-in-four)...
; MinExtraCatsPerNativeStrayEvent: Minimum framework stray extras per native event (unless blocked by MaxExtraCats)...
; MaxExtraCats: Maximum extra cats added to one native spawn event...
; CatPool: Cat source used by AppendExtra and ReplaceEach, "Mixed" uses base-game and custom cats, "NativeOnly" uses base-game strays, and "CustomOnly" uses custom_strays.ini cats...
; NativeExtraWeight: Base-game stray weight when CatPool is "Mixed", higher values make ordinary game strays more likely...
; CustomExtraWeight: Custom cat weight when CatPool is "Mixed", higher values make custom stray cats more likely...
; NativeAppendDelayMs: Delay after native stray generation before the first framework-controlled cat, DON'T INCREASE THIS UNLESS YOU EXPERIENCE CRASHES!
; NativeSpawnIntervalMs: Delay between framework-controlled extra strays in "AppendExtra" mode, DON'T INCREASE THIS UNLESS YOU EXPERIENCE CRASHES!
; AllowDuplicateCatsPerEvent: Controls repeat custom cat IDs in one event, (1 allows repeats, while 0 avoids repeats)...

[Framework]
HotkeyVk=118
ReloadHotkeyVk=120
EnableNativeStrayHook=1
NativeStrayMode=ReplaceEach
SceneName=House
HouseComponentType=House
DefinitionFileName=custom_strays.ini
DebugFileName=debug_spawns.ini

[Spawn]
RollsPerNativeStrayEvent=3
ChancePercent=100
MinExtraCatsPerNativeStrayEvent=1
MaxExtraCats=3
CatPool=Mixed
NativeExtraWeight=50
CustomExtraWeight=50
NativeAppendDelayMs=50
NativeSpawnIntervalMs=250
AllowDuplicateCatsPerEvent=0